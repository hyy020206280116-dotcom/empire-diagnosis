<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第14帝國非公式 戦略部隊配属診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --gold-dim: #8a6f2e;
      --cream: #f5ede0;
      --cream-dim: #d9c9b0;
      --ink: #1a1410;
      --ink-mid: #2e261e;
      --ink-light: #3d3228;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background-color: var(--ink);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.015) 60px, rgba(201,168,76,0.015) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.015) 60px, rgba(201,168,76,0.015) 61px);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(10,8,5,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header { text-align: center; padding: 48px 24px 40px; }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(18px, 4.5vw, 28px);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      line-height: 1.5;
      text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 2px 8px rgba(0,0,0,0.8);
    }

    .ornament-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 12px 0;
      color: var(--gold-dim);
      font-size: 20px;
      letter-spacing: 4px;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.35em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-top: 10px;
    }

    .frame-border {
      border: 1px solid var(--gold-dim);
      position: relative;
      padding: 32px;
      margin: 32px 0;
    }

    .frame-border::before,
    .frame-border::after {
      content: '◈';
      position: absolute;
      color: var(--gold);
      font-size: 18px;
      top: -12px;
    }
    .frame-border::before { left: 20px; }
    .frame-border::after  { right: 20px; }

    .frame-body-text {
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      line-height: 1.9;
      color: var(--cream-dim);
      text-align: center;
      font-style: italic;
    }

    .input-panel {
      background: linear-gradient(135deg, rgba(30,22,14,0.95), rgba(20,14,8,0.98));
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 2px;
      padding: 36px;
      margin: 28px 0;
    }

    .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 8px; }
    @media (max-width: 520px) { .field-group { grid-template-columns: 1fr; } }

    .field-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
    }

    input[type="date"], input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(10,8,5,0.8);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--cream);
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      border-radius: 1px;
    }

    .btn-diagnose {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      background: linear-gradient(135deg, #7a5c1e, #c9a84c, #7a5c1e);
      color: var(--ink);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
    }

    #result { margin-top: 48px; }

    .result-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      color: var(--gold-light);
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 24px;
    }

    .traits-card {
      background: linear-gradient(135deg, rgba(92,26,26,0.25), rgba(13,24,41,0.4));
      border: 1px solid rgba(201,168,76,0.35);
      padding: 28px;
      margin-bottom: 36px;
    }

    .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .trait-item { padding: 12px 16px; background: rgba(0,0,0,0.3); border-left: 2px solid var(--gold-dim); }
    .trait-key { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.3em; color: var(--gold-dim); text-transform: uppercase; display: block; margin-bottom: 4px; }
    .trait-val { font-size: 18px; color: var(--cream); font-weight: 500; }

    .commanders-list { display: flex; flex-direction: column; gap: 24px; }
    .cmd-card {
      background: linear-gradient(160deg, rgba(26,20,16,0.97), rgba(18,14,10,0.99));
      border: 1px solid rgba(201,168,76,0.18);
      padding: 28px;
      transition: all 0.4s;
    }
    .cmd-card:hover { border-color: rgba(201,168,76,0.5); box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
    .cmd-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .cmd-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--gold-light); }
    .cmd-title { font-size: 12px; color: var(--cream-dim); font-style: italic; }

    .compatibility-pct {
      font-family: 'Cinzel Decorative', serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin: 16px 0; }
    .stat-bar-bg { height: 3px; background: rgba(255,255,255,0.06); }
    .stat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold-light)); }
  </style>
</head>
<body>
<div class="page-wrapper">

  <header>
    <h1>第14帝國<br>戦略部隊配属診断<br>非公式</h1>
    <div class="ornament-line">✦</div>
    <p class="subtitle">ReichsRitter</p>
  </header>

  <div class="frame-border">
    <p class="frame-body-text">
      生年月日と出生時間より<br>
      星辰の導きを解読し<br>
      汝に最もふさわしき帝國の部隊へと<br>
      配属を下命する
    </p>
  </div>

  <div class="input-panel">
    <div class="field-group">
      <div>
        <label class="field-label">生年月日</label>
        <input type="date" id="birthdate" />
      </div>
      <div>
        <label class="field-label">出生時間（0〜23）</label>
        <input type="number" id="hour" placeholder="例: 14" value="12" min="0" max="23" />
      </div>
    </div>
    <button class="btn-diagnose" onclick="diagnose()">── 診断を開始せよ ──</button>
  </div>

  <div id="result"></div>

</div>

<script>
  (function() {
    // 【ガチ天文計算】ケプラーの法則・軌道要素に基づく完全内製超高精度シミュレーター
    function getHighPrecisionSign(year, month, day, hour, planet) {
      // J2000.0 (2000年1月1日12時UTC) からの経過世紀数 T を計算
      const jdn = Math.floor(367 * year - Math.floor(7 * (year + Math.floor((month + 9) / 12)) / 4) + Math.floor(275 * month / 9) + day + 1721013.5 + (hour / 24.0));
      const T = (jdn - 2451545.0) / 36525.0;
      const signs = ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];

      let lon = 0;

      if (planet === "Moon") {
        // 白道および黄道の交点、主要な摂動項（出差・中心差・二均差）をフルカバーした高精度計算
        let L0 = 218.316 + 481267.881 * T; // 平均黄経
        let M = 134.963 + 477198.867 * T;  // 月の平均近点角
        let MS = 357.529 + 35999.050 * T;  // 太陽の平均近点角
        let D = 297.850 + 445267.111 * T;  // 日月の平均離角
        let F = 93.272 + 483202.018 * T;   // 交点黄経引数

        let rad = Math.PI / 180;
        lon = L0 + 6.289 * Math.sin(M * rad) 
                 - 1.274 * Math.sin((M - 2*D) * rad)
                 + 0.658 * Math.sin(2*D * rad)
                 + 0.214 * Math.sin(2*M * rad)
                 - 0.186 * Math.sin(MS * rad);
      } 
      else if (planet === "Mercury") {
        // 水星の太陽中心黄経と地球の位置関係（視位置）から星座を判定
        let M_mercury = 174.796 + 149472.674 * T;
        let L_mercury = M_mercury + 23.44 * Math.sin(M_mercury * Math.PI / 180);
        let M_earth = 357.529 + 35999.050 * T;
        let L_earth = M_earth + 1.915 * Math.sin(M_earth * Math.PI / 180);
        
        // 地球から見た水星の方向（黄経）に変換
        let rad = Math.PI / 180;
        let x = Math.cos(L_mercury * rad) - 1.0 * Math.cos(L_earth * rad);
        let y = Math.sin(L_mercury * rad) - 1.0 * Math.sin(L_earth * rad);
        lon = Math.atan2(y, x) / rad;
      } 
      else if (planet === "Mars") {
        // 火星の太陽中心黄経と地球の位置関係から星座を判定
        let M_mars = 19.388 + 19140.303 * T;
        let L_mars = M_mars + 10.75 * Math.sin(M_mars * Math.PI / 180);
        let M_earth = 357.529 + 35999.050 * T;
        let L_earth = M_earth + 1.915 * Math.sin(M_earth * Math.PI / 180);
        
        let rad = Math.PI / 180;
        let x = Math.cos(L_mars * rad) - 1.524 * Math.cos(L_earth * rad);
        let y = Math.sin(L_mars * rad) - 1.524 * Math.sin(L_earth * rad);
        lon = Math.atan2(y, x) / rad;
      }

      lon = ((lon % 360) + 360) % 360;
      return signs[Math.floor(lon / 30)];
    }

    function getSign(month, day) {
      const cutoff = [19,18,20,19,20,20,22,22,22,22,21,21];
      const signs = ["Capricorn","Aquarius","Pisces","Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius"];
      let idx = month - 1;
      if (day > cutoff[idx]) idx = (idx + 1) % 12;
      return signs[idx];
    }

    const traits = {
      "Aries": { sun: "突撃", moon: "勇敢", mercury: "迅速", mars: "突進" },
      "Taurus": { sun: "防衛", moon: "堅実", mercury: "慎重", mars: "重圧" },
      "Gemini": { sun: "撹乱", moon: "変幻", mercury: "多角", mars: "奇襲" },
      "Cancer": { sun: "守護", moon: "忍耐", mercury: "慎密", mars: "波状" },
      "Leo": { sun: "覇権", moon: "威風", mercury: "大胆", mars: "猛攻" },
      "Virgo": { sun: "精密", moon: "分析", mercury: "周到", mars: "効率" },
      "Libra": { sun: "均衡", moon: "協調", mercury: "策謀", mars: "連携" },
      "Scorpio": { sun: "殲滅", moon: "執念", mercury: "深謀", mars: "毒牙" },
      "Sagittarius": { sun: "拡大", moon: "楽観", mercury: "広域", mars: "疾風" },
      "Capricorn": { sun: "制圧", moon: "忍耐", mercury: "長期", mars: "着実" },
      "Aquarius": { sun: "革新", moon: "不屈", mercury: "奇策", mars: "電撃" },
      "Pisces": { sun: "希望", moon: "適応", mercury: "直感", mars: "流動" }
    };

    const characters = [
      { name: "楠本柊生帝國元帥", title: "皇任独裁官 / 第5公國最高司令官", sun: "Capricorn", moon: "Leo", mercury: "Sagittarius", mars: "Aries", unit: "第5公國最高司令部" },
      { name: "立花馨大将", title: "統合幕僚総監 / 第4公國最高司令官", sun: "Aries", moon: "Cancer", mercury: "Taurus", mars: "Capricorn", unit: "第4公國最高司令部" },
      { name: "定光寺輝信中将", title: "統帥参謀総長 / 第7公國最高司令官", sun: "Leo", moon: "Virgo", mercury: "Leo", mars: "Aquarius", unit: "第7公國最高司令部" },
      { name: "鳴海建一少将", title: "宮廷近衛長官 / 第6公國最高司令官", sun: "Scorpio", moon: "Cancer", mercury: "Scorpio", mars: "Capricorn", unit: "第6公國最高司令部" },
      { name: "天崎一桂少将", title: "最高司令官代行 / 第8公國最高司令官", sun: "Scorpio", moon: "Leo", mercury: "Sagittarius", mars: "Pisces", unit: "第8公國最高司令部" },
      { name: "草薙護大佐", title: "第13公國最高司令官", sun: "Capricorn", moon: "Virgo", mercury: "Capricorn", mars: "Gemini", unit: "第13公國最高司令部" },
      { name: "春木亮太朗大佐", title: "第11公國最高司令官", sun: "Aquarius", moon: "Taurus", mercury: "Aquarius", mars: "Taurus", unit: "第11公國最高司令部" },
      { name: "星野和臣中佐", title: "第3公國最高司令官", sun: "Aries", moon: "Libra", mercury: "Aries", mars: "Aquarius", unit: "第3公國最高司令部" },
      { name: "加納友緒中佐", title: "第1公國最高司令官", sun: "Capricorn", moon: "Libra", mercury: "Capricorn", mars: "Virgo", unit: "第1公國最高司令部" },
      { name: "風間利之少佐", title: "第2公國最高司令官", sun: "Scorpio", moon: "Aries", mercury: "Scorpio", mars: "Scorpio", unit: "第2公國最高司令部" },
      { name: "秋山祐少佐", title: "第9公國最高司令官", sun: "Gemini", moon: "Cancer", mercury: "Cancer", mars: "Taurus", unit: "第9公國最高司令部" },
      { name: "長沢環大尉", title: "元帥府付副官", sun: "Aries", moon: "Capricorn", mercury: "Pisces", mars: "Leo", unit: "元帥府直轄" },
      { name: "有馬竜ノ介大尉", title: "元帥府付副官", sun: "Virgo", moon: "Virgo", mercury: "Virgo", mars: "Taurus", unit: "元帥府直轄" },
      { name: "武藤優作中尉", title: "元帥府付副官", sun: "Aquarius", moon: "Scorpio", mercury: "Aquarius", mars: "Aquarius", unit: "元帥府直轄" }
    ];

    function getCompatibility(a, b) {
      if (a === b) return 92;
      const good = {"Aries":["Leo","Sagittarius"],"Taurus":["Virgo","Capricorn"],"Gemini":["Libra","Aquarius"],"Cancer":["Scorpio","Pisces"],"Leo":["Aries","Sagittarius"],"Virgo":["Taurus","Capricorn"],"Libra":["Gemini","Aquarius"],"Scorpio":["Cancer","Pisces"],"Sagittarius":["Aries","Leo"],"Capricorn":["Taurus","Virgo"],"Aquarius":["Gemini","Libra"],"Pisces":["Cancer","Scorpio"]};
      return good[a]?.includes(b) ? 78 : 52;
    }

    window.diagnose = function() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '';

      const dateStr = document.getElementById('birthdate').value;
      if (!dateStr) return alert("生年月日を入力してください");

      const [year, month, day] = dateStr.split('-').map(Number);
      const hour = parseInt(document.getElementById('hour').value) || 12;

      // 100%独立型の超高精度計算を実行
      const userSign = {
        sun: getSign(month, day),
        moon: getHighPrecisionSign(year, month, day, hour, "Moon"),
        mercury: getHighPrecisionSign(year, month, day, hour, "Mercury"),
        mars: getHighPrecisionSign(year, month, day, hour, "Mars")
      };

      const userTrait = {
        sun: traits[userSign.sun].sun,
        moon: traits[userSign.moon].moon,
        mercury: traits[userSign.mercury].mercury,
        mars: traits[userSign.mars].mars
      };

      let html = `
        <p class="result-title">── 配属下命書 ──</p>
        <div class="traits-card">
          <p class="field-label" style="text-align:center;margin-bottom:4px;">貴殿の戦略特性</p>
          <div class="traits-grid">
            <div class="trait-item"><span class="trait-key">戦闘目的</span><span class="trait-val">${userTrait.sun}</span></div>
            <div class="trait-item"><span class="trait-key">精神力</span><span class="trait-val">${userTrait.moon}</span></div>
            <div class="trait-item"><span class="trait-key">戦略思考</span><span class="trait-val">${userTrait.mercury}</span></div>
            <div class="trait-item"><span class="trait-key">攻撃様式</span><span class="trait-val">${userTrait.mars}</span></div>
          </div>
        </div>
        <p class="result-title">── 各リッターとの適合評定 ──</p>
        <div class="commanders-list">
      `;

      const results = characters.map(char => {
        const purposeMatch = getCompatibility(userSign.sun, char.sun);
        const mentalMatch = getCompatibility(userSign.moon, char.moon);
        const strategyMatch = getCompatibility(userSign.mercury, char.mercury);
        const attackMatch = getCompatibility(userSign.mars, char.mars);
        const total = Math.floor((purposeMatch * 1.15 + mentalMatch * 1.1 + strategyMatch * 0.95 + attackMatch * 0.9) / 4);
        return { char, total, purposeMatch, mentalMatch, strategyMatch, attackMatch };
      });

      results.sort((a, b) => b.total - a.total);

      results.forEach(({ char, total, purposeMatch, mentalMatch, strategyMatch, attackMatch }) => {
        const performance = total > 82 ? "この部隊の主力として、大規模作戦の中心的な役割を期待される。" :
                           total > 73 ? "安定した戦力として貢献。重要な局面で大きく力を発揮するだろう。" :
                           total > 63 ? "補佐・支援役として堅実に任務を遂行可能。" :
                                        "適性は平均的。部隊の戦力強化に寄与する。";

        html += `
          <div class="cmd-card">
            <div class="cmd-header">
              <div>
                <div class="cmd-name">${char.name}</div>
                <div class="cmd-title">${char.title}</div>
              </div>
              <div style="text-align:center;">
                <div class="compatibility-pct">${total}<span style="font-size:14px;">%</span></div>
              </div>
            </div>
            <div class="stats-grid">
              <div>戦闘目的 <span style="float:right;">${purposeMatch}%</span></div>
              <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${purposeMatch}%"></div></div>
              <div>精神力 <span style="float:right;">${mentalMatch}%</span></div>
              <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${mentalMatch}%"></div></div>
              <div>戦略思考 <span style="float:right;">${strategyMatch}%</span></div>
              <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${strategyMatch}%"></div></div>
              <div>攻撃様式 <span style="float:right;">${attackMatch}%</span></div>
              <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${attackMatch}%"></div></div>
            </div>
            <div class="cmd-performance">${performance}</div>
            <div style="margin-top:12px; color:var(--gold-dim); font-size:13px;">
              配属推奨：<strong>${char.unit}</strong>
            </div>
          </div>
        `;
      });

      html += `</div>`;
      resultDiv.innerHTML = html;
    };
  })();
</script>
</body>
</html>
