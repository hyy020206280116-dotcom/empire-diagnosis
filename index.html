<body>

<div class="page-wrapper">

<script>

const signs = [
  "Aries","Taurus","Gemini","Cancer",
  "Leo","Virgo","Libra","Scorpio",
  "Sagittarius","Capricorn","Aquarius","Pisces"
];

function calculateRealSign(dateObj, planet) {

  try {

    const time = new Astronomy.AstroTime(dateObj);

    let body;

    switch (planet) {

      case "Sun":
        body = Astronomy.Body.Sun;
        break;

      case "Moon":
        body = Astronomy.Body.Moon;
        break;

      case "Mercury":
        body = Astronomy.Body.Mercury;
        break;

      case "Mars":
        body = Astronomy.Body.Mars;
        break;

      default:
        return "Aries";
    }

    // 地球中心黄道座標を取得
    const vector = Astronomy.GeoVector(body, time, false);

    // 黄道座標変換
    const ecliptic = Astronomy.Ecliptic(vector);

    // 黄経 0〜360
    let lon = ecliptic.elon;

    if (lon < 0) {
      lon += 360;
    }

    // 12星座へ変換
    const signIndex = Math.floor(lon / 30);

    return signs[signIndex];

  } catch (err) {

    console.error("星座計算エラー:", planet, err);

    return "Leo";
  }
}

const traits = {

  "Aries":      { sun:"突撃", moon:"勇敢", mercury:"迅速", mars:"突進" },
  "Taurus":     { sun:"防衛", moon:"堅実", mercury:"慎重", mars:"重圧" },
  "Gemini":     { sun:"撹乱", moon:"変幻", mercury:"多角", mars:"奇襲" },
  "Cancer":     { sun:"守護", moon:"忍耐", mercury:"精密", mars:"波状" },
  "Leo":        { sun:"覇権", moon:"威風", mercury:"大胆", mars:"猛攻" },
  "Virgo":      { sun:"精密", moon:"分析", mercury:"周到", mars:"効率" },
  "Libra":      { sun:"均衡", moon:"協調", mercury:"策謀", mars:"連携" },
  "Scorpio":    { sun:"殲滅", moon:"執念", mercury:"深謀", mars:"毒牙" },
  "Sagittarius":{ sun:"拡大", moon:"楽観", mercury:"広域", mars:"疾風" },
  "Capricorn":  { sun:"制圧", moon:"忍耐", mercury:"長期", mars:"着実" },
  "Aquarius":   { sun:"革新", moon:"不屈", mercury:"奇策", mars:"電撃" },
  "Pisces":     { sun:"希望", moon:"適応", mercury:"直感", mars:"流動" }

};

const characters = [

  },

  {

  },

  {

    sun: "Scorpio",

    mercury: "Sagittarius",
    mars: "Pisces",

  },

  {

  },

  {

  },

  {

function getCompatibility(a, b) {

  if (a === b) return 94;

  const elements = {

    Fire: ["Aries","Leo","Sagittarius"],
    Earth: ["Taurus","Virgo","Capricorn"],
    Air: ["Gemini","Libra","Aquarius"],
    Water: ["Cancer","Scorpio","Pisces"]

  };

  const getElement = sign =>
    Object.keys(elements).find(el =>
      elements[el].includes(sign)
    );

  const ea = getElement(a);
  const eb = getElement(b);

  if (ea === eb) return 86;

  if (
    (ea==="Fire" && eb==="Air") ||
    (ea==="Air" && eb==="Fire") ||
    (ea==="Earth" && eb==="Water") ||
    (ea==="Water" && eb==="Earth")
  ) return 78;

  if (
    (ea==="Fire" && eb==="Water") ||
    (ea==="Water" && eb==="Fire") ||
    (ea==="Earth" && eb==="Air") ||
    (ea==="Air" && eb==="Earth")
  ) return 51;

  return 64;
}

function runDiagnosis() {

  console.log("診断開始");

  const btn = document.getElementById("diagnoseBtn");
  const resultDiv = document.getElementById("result");

  btn.disabled = true;

  resultDiv.innerHTML = `
    <p style="text-align:center;padding:40px;color:#c9a84c;">
      天体を解析中…
    </p>
  `;

  setTimeout(() => {

    try {

      if (typeof Astronomy === "undefined") {
        throw new Error("Astronomy Engine の読み込みに失敗しました");
      }

      const dateStr = document.getElementById("birthdate").value;

      if (!dateStr) {
        throw new Error("生年月日を入力してください");
      }

      const hourVal = parseInt(
        document.getElementById("hour").value
      );

      if (
        isNaN(hourVal) ||
        hourVal < 0 ||
        hourVal > 23
      ) {
        throw new Error("出生時間は0〜23で入力してください");
      }

      const [year, month, day] =
        dateStr.split("-").map(Number);

      const targetDate = new Date(
        year,
        month - 1,
        day,
        hourVal,
        0,
        0
      );

      const userSign = {

        sun: calculateRealSign(targetDate, "Sun"),
        moon: calculateRealSign(targetDate, "Moon"),
        mercury: calculateRealSign(targetDate, "Mercury"),
        mars: calculateRealSign(targetDate, "Mars")

      };

      const userTrait = {

        sun: traits[userSign.sun].sun,
        moon: traits[userSign.moon].moon,
        mercury: traits[userSign.mercury].mercury,
        mars: traits[userSign.mars].mars

      };

      let html = `

        <div class="result-title">
          ── 配属下命書 ──
        </div>

        <div class="traits-card">

          <div class="field-label" style="margin-bottom:18px;">
            貴殿の戦略特性
          </div>

          <div class="traits-grid">

            <div class="trait-item">
              <span class="trait-key">
                戦闘目的（太陽:${userSign.sun}）
              </span>
              <span class="trait-val">
                ${userTrait.sun}
              </span>
            </div>

            <div class="trait-item">
              <span class="trait-key">
                精神力（月:${userSign.moon}）
              </span>
              <span class="trait-val">
                ${userTrait.moon}
              </span>
            </div>

            <div class="trait-item">
              <span class="trait-key">
                戦略思考（水星:${userSign.mercury}）
              </span>
              <span class="trait-val">
                ${userTrait.mercury}
              </span>
            </div>

            <div class="trait-item">
              <span class="trait-key">
                攻撃様式（火星:${userSign.mars}）
              </span>
              <span class="trait-val">
                ${userTrait.mars}
              </span>
            </div>

          </div>

        </div>

        <div class="result-title">
          ── 各司令官との適合評定 ──
        </div>

      `;

      const results = characters.map(char => {

        const p = getCompatibility(userSign.sun, char.sun);
        const m = getCompatibility(userSign.moon, char.moon);
        const s = getCompatibility(userSign.mercury, char.mercury);
        const a = getCompatibility(userSign.mars, char.mars);

        const total = Math.floor(
          (p * 1.2 + m * 1.15 + s * 0.95 + a * 0.9) / 4
        );

        return { char, total, p, m, s, a };

      });

      results.sort((a,b) => b.total - a.total);

      results.forEach(({char,total,p,m,s,a}) => {

        let performance = "";

        if (total > 84) {
          performance =
            "この部隊の主力として、大規模作戦の中心任務を担う可能性が高い。";
        }
        else if (total > 76) {
          performance =
            "高い適応能力を持ち、重要局面において大きな戦果を期待される。";
        }
        else if (total > 67) {
          performance =
            "安定した補佐戦力として堅実に任務を遂行可能。";
        }
        else {
          performance =
            "標準的適性。訓練次第で更なる戦力向上が見込まれる。";
        }

        html += `

          <div class="cmd-card">

            <div class="cmd-header">

              <div>

                <div class="cmd-name">
                  ${char.name}
                </div>

                <div class="cmd-title">
                  ${char.title}
                </div>

              </div>

              <div class="compatibility">
                ${total}%
              </div>

            </div>

            <div class="stats">

              ${createStat("戦闘目的", p)}
              ${createStat("精神力", m)}
              ${createStat("戦略思考", s)}
              ${createStat("攻撃様式", a)}

            </div>

            <div class="performance">
              ${performance}
            </div>

            <div class="unit">
              配属推奨：${char.unit}
            </div>

          </div>

        `;
      });

      html += `
        <button class="reset-btn" onclick="location.reload()">
          もう一度診断する
        </button>
      `;

      resultDiv.innerHTML = html;

    } catch (err) {

      console.error(err);

      resultDiv.innerHTML = `
        <p style="
          color:#ff6b6b;
          text-align:center;
          padding:40px;
          line-height:1.8;
        ">
          ${err.message}
        </p>
      `;

    } finally {

      btn.disabled = false;

    }

  }, 500);
}

function createStat(label, value) {

  return `

    <div class="stat">

      <div class="stat-row">
        <span>${label}</span>
        <span>${value}%</span>
      </div>

      <div class="bar-bg">
        <div
          class="bar-fill"
          style="width:${value}%"
        ></div>
      </div>

    </div>

  `;
}

document
  .getElementById("diagnoseBtn")
  .addEventListener("click", runDiagnosis);

</script>
