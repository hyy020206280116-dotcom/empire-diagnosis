function calculateRealSign(dateObj, planet) {
  try {
    const time = new Astronomy.AstroTime(dateObj);
    var body;
    if (planet === "Sun")     body = Astronomy.Body.Sun;
    else if (planet === "Moon")    body = Astronomy.Body.Moon;
    else if (planet === "Mercury") body = Astronomy.Body.Mercury;
    else if (planet === "Venus")   body = Astronomy.Body.Venus;
    else if (planet === "Mars")    body = Astronomy.Body.Mars;
    else if (planet === "Jupiter") body = Astronomy.Body.Jupiter;
    else if (planet === "Saturn")  body = Astronomy.Body.Saturn;
    else if (planet === "Uranus")  body = Astronomy.Body.Uranus;
    else if (planet === "Neptune") body = Astronomy.Body.Neptune;
    else if (planet === "Pluto")   body = Astronomy.Body.Pluto;
    else return "Aries";
    const vector = Astronomy.GeoVector(body, time, false);
    const ecliptic = Astronomy.Ecliptic(vector);
    var lon = ecliptic.elon;
    if (lon < 0) lon += 360;
    return signs[Math.floor(lon / 30)];
  } catch(err) {
    console.error("星座計算エラー:", planet, err);
    return "Leo";
  }
}

function getLongitude(dateObj, planet) {
  try {
    const time = new Astronomy.AstroTime(dateObj);
    var body;
    if (planet === "Sun")     body = Astronomy.Body.Sun;
    else if (planet === "Moon")    body = Astronomy.Body.Moon;
    else if (planet === "Mercury") body = Astronomy.Body.Mercury;
    else if (planet === "Venus")   body = Astronomy.Body.Venus;
    else if (planet === "Mars")    body = Astronomy.Body.Mars;
    else if (planet === "Jupiter") body = Astronomy.Body.Jupiter;
    else if (planet === "Saturn")  body = Astronomy.Body.Saturn;
    else if (planet === "Uranus")  body = Astronomy.Body.Uranus;
    else if (planet === "Neptune") body = Astronomy.Body.Neptune;
    else if (planet === "Pluto")   body = Astronomy.Body.Pluto;
    else return 0;
    const vector = Astronomy.GeoVector(body, time, false);
    const ecliptic = Astronomy.Ecliptic(vector);
    var lon = ecliptic.elon;
    if (lon < 0) lon += 360;
    return lon;
  } catch(err) { return 0; }
}

function calcAngle(a, b) {
  var d = Math.abs(a - b);
  return d > 180 ? 360 - d : d;
}

function getAspectName(angle) {
  if (angle <= 8)   return "Conjunction";
  if (Math.abs(angle - 60)  <= 5)  return "Sextile";
  if (Math.abs(angle - 90)  <= 6)  return "Square";
  if (Math.abs(angle - 120) <= 6)  return "Trine";
  if (Math.abs(angle - 180) <= 8)  return "Opposition";
  return null;
}

  var planetList = ["Sun","Moon","Mercury","Venus","Mars","Jupiter","Saturn","Uranus","Neptune","Pluto"];
  var lons = {};
  for (var i = 0; i < planetList.length; i++) {
    lons[planetList[i]] = getLongitude(dateObj, planetList[i]);
  }
  var found = [];
  for (var i = 0; i < planetList.length; i++) {
    for (var j = i + 1; j < planetList.length; j++) {
      var angle = calcAngle(lons[planetList[i]], lons[planetList[j]]);
      var asp = getAspectName(angle);
      if (!asp) continue;
      var key = planetList[i] + "-" + planetList[j] + "-" + asp;
      if (specialPatterns[key]) {
        found.push({ key: key, data: specialPatterns[key] });
      }
    }
  }
  return found;
}

function getCompatibility(a, b) {
  if (a === b) return 94;
  var elements = {
    Fire: ["Aries","Leo","Sagittarius"],
    Earth: ["Taurus","Virgo","Capricorn"],
    Air: ["Gemini","Libra","Aquarius"],
    Water: ["Cancer","Scorpio","Pisces"]
  };
  var getElement = function(sign) {
    return Object.keys(elements).find(function(el){ return elements[el].indexOf(sign) >= 0; });
  };
  var ea = getElement(a), eb = getElement(b);
  if (ea === eb) return 86;
  if ((ea==="Fire"&&eb==="Air")||(ea==="Air"&&eb==="Fire")||(ea==="Earth"&&eb==="Water")||(ea==="Water"&&eb==="Earth")) return 78;
  if ((ea==="Fire"&&eb==="Water")||(ea==="Water"&&eb==="Fire")||(ea==="Earth"&&eb==="Air")||(ea==="Air"&&eb==="Earth")) return 51;
  return 64;
}

function createStat(label, value) {
  return '<div class="stat"><div class="stat-row"><span>' + label + '</span><span>' + value + '%</span></div><div class="bar-bg"><div class="bar-fill" style="width:' + value + '%"></div></div></div>';
}

function runDiagnosis() {
  var btn = document.getElementById("diagnoseBtn");
  var resultDiv = document.getElementById("result");
  btn.disabled = true;
  resultDiv.innerHTML = '<p style="text-align:center;padding:40px;color:#c9a84c;">天体を解析中…</p>';

  setTimeout(function() {
    try {
      if (typeof Astronomy === "undefined") throw new Error("Astronomy Engine の読み込みに失敗しました");

      var dateStr = document.getElementById("birthdate").value;
      if (!dateStr) throw new Error("生年月日を入力してください");

      var hourVal = parseInt(document.getElementById("hour").value);
      if (isNaN(hourVal) || hourVal < 0 || hourVal > 23) throw new Error("出生時間は0〜23で入力してください");

      var parts = dateStr.split("-").map(Number);
      var targetDate = new Date(parts[0], parts[1]-1, parts[2], hourVal, 0, 0);

      var userSign = {
        sun:     calculateRealSign(targetDate, "Sun"),
        moon:    calculateRealSign(targetDate, "Moon"),
        mercury: calculateRealSign(targetDate, "Mercury"),
        venus:   calculateRealSign(targetDate, "Venus"),
        mars:    calculateRealSign(targetDate, "Mars")
      };

      var userTrait = {
        sun:     traits[userSign.sun].sun,
        moon:    traits[userSign.moon].moon,
        mercury: traits[userSign.mercury].mercury,
        mars:    traits[userSign.mars].mars
      };

      var patterns = analyzeSpecialPatterns(targetDate);

      // ---- 結果HTML構築 ----
      var html = '<div class="result-title">── 配属下命書 ──</div>';

      // 戦略特性グリッド
      html += '<div class="traits-card">';
      html += '<div class="field-label" style="margin-bottom:18px;">貴殿の戦略特性</div>';
      html += '<div class="traits-grid">';
      html += '<div class="trait-item"><span class="trait-key">戦闘目的（太陽:' + userSign.sun + '）</span><span class="trait-val">' + userTrait.sun + '</span></div>';
      html += '<div class="trait-item"><span class="trait-key">精神力（月:' + userSign.moon + '）</span><span class="trait-val">' + userTrait.moon + '</span></div>';
      html += '<div class="trait-item"><span class="trait-key">戦略思考（水星:' + userSign.mercury + '）</span><span class="trait-val">' + userTrait.mercury + '</span></div>';
      html += '<div class="trait-item"><span class="trait-key">攻撃様式（火星:' + userSign.mars + '）</span><span class="trait-val">' + userTrait.mars + '</span></div>';
      html += '</div>'; // traits-grid

      html += '<hr class="divider">';

      // 本質傾向
      html += '<div class="section-label">本質傾向</div>';
      html += '<div class="essence-block">';
      html += (interpretation.sun[userSign.sun] || "");
      if (interpretation.moon[userSign.moon]) {
        html += '<br><span style="font-size:14px;color:var(--cream-dim);">' + interpretation.moon[userSign.moon] + '</span>';
      }
      html += '</div>';

      // 特殊補正（パターンがある場合のみ）
      if (patterns.length > 0) {
        html += '<div class="section-label">天体配置による特殊補正</div>';
        for (var pi = 0; pi < patterns.length; pi++) {
          var pat = patterns[pi];
          html += '<div class="correction-item">';
          html += '<span class="correction-label">' + pat.data.label + '</span>';
          html += ' <span class="correction-bonus">［' + pat.data.bonus + '］</span><br>';
          html += pat.data.text;
          html += '</div>';
        }
      }

      html += '</div>'; // traits-card

      // 公國適性スコア計算
      var nationResults = nations.map(function(nat) {
        var score = 0;
        var reasons = [];
        if (nat.affinity && nat.affinity.sun && nat.affinity.sun.indexOf(userSign.sun) >= 0) {
          score += 30; reasons.push("国家理念への適応性が高い");
        }
        if (nat.affinity && nat.affinity.moon && nat.affinity.moon.indexOf(userSign.moon) >= 0) {
          score += 25; reasons.push("國民性との精神親和性が高い");
        }
        if (nat.affinity && nat.affinity.venus && nat.affinity.venus.indexOf(userSign.venus) >= 0) {
          score += 20; reasons.push("文化・生活感覚への適応性を持つ");
        }
        if (nat.affinity && nat.affinity.mars && nat.affinity.mars.indexOf(userSign.mars) >= 0) {
          score += 25; reasons.push("軍事行動原理との一致が見られる");
        }
        if (score < 35) score += 35;
        if (score > 100) score = 100;
        return { nation: nat, score: score, reasons: reasons };
      });
      nationResults.sort(function(a, b){ return b.score - a.score; });

      html += '<div class="result-title">── 地政学的公國適性 ──</div>';

      for (var ni = 0; ni < nationResults.length; ni++) {
        var res = nationResults[ni];
        var nat = res.nation;
        var rankText = res.score >= 85 ? '【極めて高い適性】' : res.score >= 70 ? '【高適性】' : res.score >= 55 ? '【標準適性】' : '【低適性】';
        var rankColor = res.score >= 70 ? 'var(--gold-light)' : 'var(--cream-dim)';
        var cardHtml = '';
        cardHtml += '<div class="traits-card">';
        cardHtml += '<div class="cmd-header"><div>';
        cardHtml += '<div class="cmd-name">' + nat.name + '</div>';
        cardHtml += '<div class="cmd-title">最高司令官：' + nat.commander + '</div>';
        cardHtml += '</div><div class="compatibility">' + res.score + '%</div></div>';
        cardHtml += '<div style="color:' + rankColor + ';margin-bottom:12px;font-size:14px;">' + rankText + '</div>';
        cardHtml += '<div style="line-height:1.9;color:var(--cream-dim);font-size:14px;">';
        cardHtml += '<strong>氣候：</strong>' + nat.climate + '<br>';
        cardHtml += '<strong>象徴動物：</strong>' + nat.animal + '<br>';
        cardHtml += '<strong>特産：</strong>' + nat.specialty + '<br>';
        cardHtml += '<strong>主要産業：</strong>' + nat.industry;
        cardHtml += '</div>';
        cardHtml += '<div style="margin-top:14px;color:var(--gold);line-height:1.8;font-size:14px;">' + nat.themes.map(function(t){ return '#' + t; }).join(' ') + '</div>';
        cardHtml += '<div style="margin-top:16px;padding:14px;background:rgba(255,255,255,.03);border-left:2px solid var(--gold-dim);line-height:1.9;font-size:14px;color:var(--cream-dim);">';
        cardHtml += '<div style="color:var(--gold-light);margin-bottom:8px;">【適性分析】</div>';
        cardHtml += res.reasons.length > 0 ? res.reasons.map(function(r){ return '・' + r; }).join('<br>') : '・顕著な適性傾向は確認されなかった';
        cardHtml += '</div>';
        cardHtml += '<div class="performance" style="margin-top:18px;font-size:13px;">' + nat.memo + '</div>';
        cardHtml += '</div>';

        if (ni < 3) {
          // 上位3つはそのまま表示
          html += cardHtml;
        } else if (ni === 3) {
          // 4つ目から折りたたみ開始
          html += '<div id="nation-more" style="display:none;">';
          html += cardHtml;
        } else {
          html += cardHtml;
        }
      }
      // 折りたたみ閉じタグ＋ボタン
      html += '</div>';
      html += '<button onclick="var el=document.getElementById(\'nation-more\');var btn=this;if(el.style.display===\'none\'){el.style.display=\'block\';btn.textContent=\'── 折りたたむ ──\';}else{el.style.display=\'none\';btn.textContent=\'── 残りの公國を表示する ──\';}" style="width:100%;margin-bottom:30px;padding:12px;background:transparent;border:1px solid var(--gold-dim);color:var(--gold-light);cursor:pointer;font-family:Cinzel,serif;letter-spacing:.2em;font-size:12px;">── 残りの公國を表示する ──</button>';

      // 司令官との適合評定
      html += '<div class="result-title">── 各司令官との適合評定 ──</div>';

      var results = characters.map(function(char) {
        var p = getCompatibility(userSign.sun,     char.sun);
        var m = getCompatibility(userSign.moon,    char.moon);
        var s = getCompatibility(userSign.mercury, char.mercury);
        var a = getCompatibility(userSign.mars,    char.mars);
        var total = Math.floor((p*1.2 + m*1.15 + s*0.95 + a*0.9) / 4);
        for (var xi = 0; xi < patterns.length; xi++) {
          var bonusNum = parseInt(patterns[xi].data.bonus.replace(/[^0-9]/g, ""));
          total += Math.floor(bonusNum / 5);
        }
        if (total > 100) total = 100;
        return { char:char, total:total, p:p, m:m, s:s, a:a };
      });

      results.sort(function(a, b){ return b.total - a.total; });

      for (var ri = 0; ri < results.length; ri++) {
        var r = results[ri];
        var performance =
          r.total > 84 ? "この部隊の主力として、大規模作戦の中心任務を担う可能性が高い。" :
          r.total > 76 ? "高い適応能力を持ち、重要局面において大きな戦果を期待される。" :
          r.total > 67 ? "安定した補佐戦力として堅実に任務を遂行可能。" :
                         "標準的適性。訓練次第で更なる戦力向上が見込まれる。";

        html += '<div class="cmd-card">';
        html += '<div class="cmd-header"><div>';
        html += '<div class="cmd-name">' + r.char.name + '</div>';
        html += '<div class="cmd-title">' + r.char.title + '</div>';
        html += '</div><div class="compatibility">' + r.total + '%</div></div>';
        html += '<div class="stats">' + createStat("戦闘目的", r.p) + createStat("精神力", r.m) + createStat("戦略思考", r.s) + createStat("攻撃様式", r.a) + '</div>';
        html += '<div class="performance">' + performance + '</div>';
        html += '<div class="unit">配属推奨：' + r.char.unit + '</div>';
        html += '</div>';
      }

      html += '<button class="reset-btn" onclick="location.reload()">もう一度診断する</button>';
      resultDiv.innerHTML = html;

    } catch(err) {
      console.error(err);
      resultDiv.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:40px;line-height:1.8;">' + err.message + '</p>';
    } finally {
      btn.disabled = false;
    }
  }, 500);
}

document.getElementById("diagnoseBtn").addEventListener("click", runDiagnosis);
</script>
</body>
</html>
